config:
  observability:config:
    grafana:
      # renovate: datasource=helm registryUrl=https://grafana.github.io/helm-charts packageName=grafana versioning=helm
      version: 10.5.15
      # renovate: datasource=docker packageName=python versioning=docker
      backup-python-version: 3.14-alpine
      admin-password:
        secure: AAABAEM5oB9kymDzomUyc6PeyEn3tHco+1pd+twZ9M1WZpHrpju7pPvAVj8fvtLMkskA1dyXVKJolBwWFTeAtb+XoTHI9br87ayYjJ84EOw=
    loki:
      # renovate: datasource=helm registryUrl=https://grafana.github.io/helm-charts packageName=loki versioning=helm
      version: 7.0.0
      retention-days: 15
    mimir:
      # renovate: datasource=helm registryUrl=https://grafana.github.io/helm-charts packageName=mimir-distributed versioning=helm
      version: 6.0.6
      retention-days: 15
    alloy:
      # renovate: datasource=helm registryUrl=https://grafana.github.io/helm-charts packageName=alloy versioning=helm
      version: 1.8.1
      static-scrape-targets:
        - name: pbs_node_exporter
          job-name: node-exporter
          address: pbs.mpagel.de:9100
          labels:
            instance: pbs
            role: pbs
            source: proxmox
        - name: pve_node_exporter
          job-name: node-exporter
          address: pve-02.mpagel.de:9100
          labels:
            instance: pve-02
            role: pve
            source: proxmox
        - name: pve_exporter
          job-name: pve-exporter
          address: pve-02.mpagel.de:9221
          metrics-path: /pve
          labels:
            instance: pve-02
            role: pve
            source: proxmox
        - name: homeassistant
          job-name: homeassistant
          address: ha.mpagel.de:443
          scheme: https
          metrics-path: /api/prometheus
          bearer-token:
            secure: AAABANcrmfmnc6XJ5+e2JZ3A4TleRGJ7YxFFbsWlGVrlyX7C+j48KKPDHm2M8roHmBNDruk6yEy3HEDBjLBHj85bv7ZBvp8a4bLN+25jDty14PkNGI59J1p0150clvolVO/dljwsfi382M5sKC50qQfuzG+363gHDzgYnIWgjoPCvOlUyIKugLTzJ0/DJ34KgoYpYWkyRIcU59brfmGNh5gZvtIWmLbD8WxjZBSA3FxErdb4zKAnMMt+D+qX7L1cLRTUVx/UCfId54t05WFb0GSWCQoaM14=
          labels:
            instance: homeassistant
            role: homeassistant
            source: homeassistant
    kube-state-metrics:
      # renovate: datasource=helm registryUrl=https://prometheus-community.github.io/helm-charts packageName=kube-state-metrics versioning=helm
      version: 7.3.0
    ingress:
      grafana-hostname: grafana.app.mpagel.de
      logs-hostname: logs.app.mpagel.de
