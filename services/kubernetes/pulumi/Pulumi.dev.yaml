config:
  kubernetes:config:
    proxmox:
      node-name: pve
      api-endpoint: https://pve-02.mpagel.de:8006
      api-token:
        envvar: PROXMOX_API_TOKEN__PVE_01__PULUMI
    microk8s:
      master-nodes:
        - name: k8s-dev-master-0
          vmid: 1010
          ipv4-address: 10.0.10.100/24
          cores: 2
          memory-mb-min: 2048
          memory-mb-max: 4096
          root-disk-size-gb: 64
          data-disk-size-gb: 32
      ssh-public-key: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIThrWKIoEj20S3DosaiKBRUGA89qe1xz9hch2+VhSGd mpagel@k8s-dev
      vlan-id: 10
      sub-domain: app-dev.mpagel.de
    metallb:
      # renovate: datasource=github-releases packageName=metallb/metallb versioning=semver
      version: 0.15.3
      ipv4-start: 10.0.10.115
      ipv4-end: 10.0.10.120
    cert-manager:
      # renovate: datasource=helm registryUrl=https://charts.jetstack.io packageName=cert-manager versioning=helm
      version: v1.20.2
      acme-email: mike@mpagel.de
    traefik:
      # renovate: datasource=github-releases packageName=traefik/traefik-helm-chart versioning=semver
      version: v39.0.7
    cloudflare:
      api-token:
        envvar: CLOUDFLARE_TOKEN
    csi-driver-smb:
      # renovate: datasource=github-releases packageName=kubernetes-csi/csi-driver-smb versioning=loose
      version: v1.20.1
    kube-state-metrics:
      # renovate: datasource=helm registryUrl=https://prometheus-community.github.io/helm-charts packageName=kube-state-metrics versioning=helm
      version: 7.2.2
