- name: Scale down CPU frequency if no load
  hosts: pve
  gather_facts: false

  tasks:
    - name: Set scaling governor via GRUB
      ansible.builtin.copy:
        dest: /etc/default/grub.d/powersave-governor.cfg
        mode: "0644"
        content: |
          GRUB_CMDLINE_LINUX_DEFAULT="$GRUB_CMDLINE_LINUX_DEFAULT cpufreq.default_governor=powersave"
      notify:
        - Update grub
        - Reboot host

    - name: Persist AMD EPP setting
      ansible.builtin.copy:
        dest: /etc/systemd/system/cpu-epp-balance-power.service
        mode: "0644"
        content: |
          [Unit]
          Description=Set CPU energy performance preference to balance_power
          After=multi-user.target

          [Service]
          Type=oneshot
          ExecStart=/bin/sh -c 'for f in /sys/devices/system/cpu/cpu*/cpufreq/energy_performance_preference; do echo balance_power > "$f"; done'

          [Install]
          WantedBy=multi-user.target
      notify:
        - Reload systemd
        - Enable and start EPP service

  handlers:
    - name: Update grub
      ansible.builtin.command: update-grub
      changed_when: true

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start EPP service
      ansible.builtin.systemd:
        name: cpu-epp-balance-power.service
        enabled: true
        state: started

    - name: Reboot host
      ansible.builtin.reboot:
        msg: Reboot triggered by cpufreq governor change
        reboot_timeout: 900
        post_reboot_delay: 10
