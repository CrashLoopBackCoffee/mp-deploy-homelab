- name: Scale down CPU frequency if no load
  hosts:
    - pbs
    - pve
  gather_facts: false

  tasks:
    - name: Check cpufreq sysfs interface is available
      ansible.builtin.command: test -d /sys/devices/system/cpu/cpu0/cpufreq
      register: cpufreq_sysfs_check
      changed_when: false
      failed_when: false

    - name: Abort when cpufreq interface is unavailable
      ansible.builtin.fail:
        msg: >-
          cpufreq sysfs interface is missing on this host
          (/sys/devices/system/cpu/cpu0/cpufreq). Ensure the CPU frequency
          scaling driver is available and loaded before running this playbook.
      when: cpufreq_sysfs_check.rc != 0

    - name: Check if energy_performance_preference sysfs files exist
      ansible.builtin.shell: |
        ls /sys/devices/system/cpu/cpu*/cpufreq/energy_performance_preference >/dev/null 2>&1
      register: epp_sysfs_check
      changed_when: false
      failed_when: false

    - name: Set scaling governor via GRUB
      ansible.builtin.copy:
        dest: /etc/default/grub.d/powersave-governor.cfg
        mode: "0644"
        content: |
          GRUB_CMDLINE_LINUX_DEFAULT="$GRUB_CMDLINE_LINUX_DEFAULT cpufreq.default_governor=powersave"
      notify:
        - Update grub
        - Reboot host

    - name: Persist AMD EPP setting
      ansible.builtin.copy:
        dest: /etc/systemd/system/cpu-epp-balance-power.service
        mode: "0644"
        content: |
          [Unit]
          Description=Set CPU energy performance preference to balance_power
          After=multi-user.target

          [Service]
          Type=oneshot
          ExecStart=/bin/sh -c 'for f in /sys/devices/system/cpu/cpu*/cpufreq/energy_performance_preference; do [ -e "$f" ] || continue; [ -w "$f" ] || continue; avail="${f%/*}/energy_performance_available_preferences"; if [ -r "$avail" ] && ! grep -qw balance_power "$avail"; then continue; fi; (echo balance_power > "$f") >/dev/null 2>&1 || true; done; exit 0'

          [Install]
          WantedBy=multi-user.target
      notify:
        - Reboot host
      when: epp_sysfs_check.rc == 0

    - name: Enable EPP service for next boot
      ansible.builtin.systemd:
        name: cpu-epp-balance-power.service
        enabled: true
        daemon_reload: true
      when: epp_sysfs_check.rc == 0

    - name: Warn when EPP sysfs files are not available
      ansible.builtin.debug:
        msg: >-
          Skipping EPP systemd service because
          /sys/devices/system/cpu/cpu*/cpufreq/energy_performance_preference
          is not present on this host.
      when: epp_sysfs_check.rc != 0

  handlers:
    - name: Update grub
      ansible.builtin.command: update-grub
      changed_when: true

    - name: Reboot host
      ansible.builtin.reboot:
        msg: Reboot triggered by cpufreq governor change
        reboot_timeout: 900
        post_reboot_delay: 10
