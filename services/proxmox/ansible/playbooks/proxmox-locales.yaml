- name: Ensure required locales are available
  hosts: pbs,pve
  gather_facts: false
  vars:
    required_locales:
      - de_DE.UTF-8
      - en_US.UTF-8

  tasks:
    - name: Query installed locales
      ansible.builtin.command: locale -a
      register: locale_list_result
      changed_when: false

    - name: Build normalized locale list
      ansible.builtin.set_fact:
        normalized_installed_locales: >-
          {{
            locale_list_result.stdout_lines
            | map('replace', '.utf8', '.UTF-8')
            | map('replace', '.utf-8', '.UTF-8')
            | map('replace', '.UTF8', '.UTF-8')
            | list
          }}

    - name: Determine missing locales
      ansible.builtin.set_fact:
        missing_locales: >-
          {{ required_locales | reject('in', normalized_installed_locales) | list }}

    - name: Enable missing locales in /etc/locale.gen
      ansible.builtin.lineinfile:
        path: /etc/locale.gen
        regexp: '^#?\s*{{ item | regex_escape }}\s+UTF-8$'
        line: '{{ item }} UTF-8'
        state: present
      loop: '{{ missing_locales }}'

    - name: Generate locales when required
      ansible.builtin.command: locale-gen
      when:
        - missing_locales | length > 0
      changed_when: true

    - name: Re-check installed locales
      ansible.builtin.command: locale -a
      register: locale_list_after_result
      changed_when: false

    - name: Ensure all required locales are installed
      ansible.builtin.assert:
        that: >-
          item in (locale_list_after_result.stdout_lines
          | map('replace', '.utf8', '.UTF-8')
          | map('replace', '.utf-8', '.UTF-8')
          | map('replace', '.UTF8', '.UTF-8')
          | list)
        fail_msg: 'Locale {{ item }} is still missing after locale generation.'
        success_msg: 'Locale {{ item }} is available.'
      loop: '{{ required_locales }}'
      when: not ansible_check_mode
